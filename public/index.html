<script>

function go(customUrl){

  let url =
    customUrl ||
    document.getElementById("url").value;

  if(!url.includes(".")){

    url =
    "https://www.google.com/search?q=" +
    encodeURIComponent(url);

  }

  else if(!url.startsWith("http")){

    url = "https://" + url;

  }

  localStorage.setItem("lastUrl", url);

  saveHistory(url);

  document
  .getElementById("loading")
  .style.display = "block";

  document
  .getElementById("frame")
  .src =
  "/api/proxy?url=" +
  encodeURIComponent(url);

  document
  .getElementById("tabTitle")
  .innerText =
  "🌐 " + url;
}

function back(){

  document
  .getElementById("frame")
  .contentWindow
  .history
  .back();

}

function forward(){

  document
  .getElementById("frame")
  .contentWindow
  .history
  .forward();

}

function reloadPage(){

  document
  .getElementById("frame")
  .contentWindow
  .location
  .reload();

}

function homePage(){

  document
  .getElementById("frame")
  .src = "";

  document
  .getElementById("url")
  .value = "";

  document
  .getElementById("tabTitle")
  .innerText =
  "🌐 Home";
}

function newTab(){

  document
  .getElementById("frame")
  .src = "";

  document
  .getElementById("url")
  .value = "";

  document
  .getElementById("tabTitle")
  .innerText =
  "🌐 New Tab";

}

function closeTab(){

  document
  .getElementById("frame")
  .src = "";

  document
  .getElementById("url")
  .value = "";

  document
  .getElementById("tabTitle")
  .innerText =
  "❌ Closed";

}

function toggleSettings(){

  let panel =
    document.getElementById("settingsPanel");

  if(panel.style.display === "block"){

    panel.style.display = "none";

  }

  else{

    panel.style.display = "block";

  }

}

function clearHistory(){

  localStorage.removeItem("history");

  renderHistory();
}

function clearBookmarks(){

  localStorage.removeItem("bookmarks");

  renderBookmarks();
}

function saveBookmark(){

  let url =
    document.getElementById("url").value;

  let bookmarks =
    JSON.parse(
      localStorage.getItem("bookmarks")
      || "[]"
    );

  bookmarks.push(url);

  localStorage.setItem(
    "bookmarks",
    JSON.stringify(bookmarks)
  );

  renderBookmarks();
}

function renderBookmarks(){

  let container =
    document.getElementById("bookmarks");

  container.innerHTML = "";

  let bookmarks =
    JSON.parse(
      localStorage.getItem("bookmarks")
      || "[]"
    );

  bookmarks.forEach((url, index) => {

    let div =
      document.createElement("div");

    div.className = "bookmark";

    let text =
      document.createElement("span");

    text.innerHTML = `
      <imgs://www.google.com/s2/favicons?domain=${url}
      ${url}
    `;

    text.onclick = function(){
      go(url);
    };

    let del =
      document.createElement("span");

    del.innerText = " ✕";

    del.style.color = "red";

    del.style.marginLeft = "10px";

    del.style.cursor = "pointer";

    del.onclick = function(e){

      e.stopPropagation();

      bookmarks.splice(index, 1);

      localStorage.setItem(
        "bookmarks",
        JSON.stringify(bookmarks)
      );

      renderBookmarks();
    };

    div.appendChild(text);

    div.appendChild(del);

    container.appendChild(div);

  });

}

function saveHistory(url){

  let history =
    JSON.parse(
      localStorage.getItem("history")
      || "[]"
    );

  history.unshift(url);

  history = history.slice(0, 10);

  localStorage.setItem(
    "history",
    JSON.stringify(history)
  );

  renderHistory();
}

function renderHistory(){

  let container =
    document.getElementById("history");

  container.innerHTML = "";

  let history =
    JSON.parse(
      localStorage.getItem("history")
      || "[]"
    );

  history.forEach(url => {

    let div =
      document.createElement("div");

    div.className = "historyItem";

    div.innerHTML = `
      <img src="https://.com/s2/favicons?domain=${url}
      ${url}
    `;

    div.onclick = function(){
      go(url);
    };

    container.appendChild(div);

  });

}

document
.getElementById("url")
.addEventListener("keypress", function(e){

  if(e.key === "Enter"){
    go();
  }

});

document
.getElementById("frame")
.onload = function(){

  document
  .getElementById("loading")
  .style.display = "none";

}

document
.getElementById("url")
.value =
localStorage.getItem("lastUrl") || "";

renderBookmarks();

renderHistory();

const suggestions = [

  "youtube.com",
  "google.com",
  "wikipedia.org",
  "github.com",
  "chatgpt.com",
  "minecraft.net",
  "vercel.com"

];

document
.getElementById("url")
.addEventListener("input", function(){

  let value =
    this.value.toLowerCase();

  let container =
    document.getElementById("suggestions");

  container.innerHTML = "";

  if(value === "") return;

  suggestions.forEach(site => {

    if(site.includes(value)){

      let div =
        document.createElement("div");

      div.className =
        "suggestion";

      div.innerText = site;

      div.onclick = function(){

        document
        .getElementById("url")
        .value = site;

        container.innerHTML = "";

        go();
      };

      container.appendChild(div);

    }

  });

});

</script>
