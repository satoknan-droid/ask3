<script>

function go(customUrl){

  let url =
    customUrl ||
    document.getElementById("url").value;

  if(!url.includes(".")){

    url =
    "https://www.google.com/search?q=" +
    encodeURIComponent(url);

  }

  else if(!url.startsWith("http")){

    url = "https://" + url;

  }

  localStorage.setItem("lastUrl", url);

  document
  .getElementById("loading")
  .style.display = "block";

  document
  .getElementById("frame")
  .src =
  "/api/proxy?url=" +
  encodeURIComponent(url);

  document
  .getElementById("tabTitle")
  .innerText =
  "🌐 " + url;
}

function back(){

  document
  .getElementById("frame")
  .contentWindow
  .history
  .back();

}

function forward(){

  document
  .getElementById("frame")
  .contentWindow
  .history
  .forward();

}

function reloadPage(){

  document
  .getElementById("frame")
  .contentWindow
  .location
  .reload();

}

function homePage(){

  document
  .getElementById("frame")
  .src = "";

  document
  .getElementById("url")
  .value = "";

  document
  .getElementById("tabTitle")
  .innerText =
  "🌐 Home";
}

function newTab(){

  document
  .getElementById("frame")
  .src = "";

  document
  .getElementById("url")
  .value = "";

  document
  .getElementById("tabTitle")
  .innerText =
  "🌐 New Tab";

}

function closeTab(){

  document
  .getElementById("frame")
  .src = "";

  document
  .getElementById("url")
  .value = "";

  document
  .getElementById("tabTitle")
  .innerText =
  "❌ Closed";

}

function saveBookmark(){

  let url =
    document.getElementById("url").value;

  let bookmarks =
    JSON.parse(
      localStorage.getItem("bookmarks")
      || "[]"
    );

  bookmarks.push(url);

  localStorage.setItem(
    "bookmarks",
    JSON.stringify(bookmarks)
  );

  renderBookmarks();
}

function renderBookmarks(){

  let container =
    document.getElementById("bookmarks");

  container.innerHTML = "";

  let bookmarks =
    JSON.parse(
      localStorage.getItem("bookmarks")
      || "[]"
    );

  bookmarks.forEach(url => {

    let div =
      document.createElement("div");

    div.className = "bookmark";

    div.innerText = url;

    div.onclick = function(){
      go(url);
    };

    container.appendChild(div);

  });

}

document
.getElementById("url")
.addEventListener("keypress", function(e){

  if(e.key === "Enter"){
    go();
  }

});

document
.getElementById("frame")
.onload = function(){

  document
  .getElementById("loading")
  .style.display = "none";

}

document
.getElementById("url")
.value =
localStorage.getItem("lastUrl") || "";

renderBookmarks();

</script>
