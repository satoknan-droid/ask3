<script>

function go(){

  let url =
    document.getElementById("url").value;

  if(!url.includes(".")){

    url =
    "https://www.google.com/search?q=" +
    encodeURIComponent(url);

  }

  else if(!url.startsWith("http")){

    url = "https://" + url;

  }

  localStorage.setItem("lastUrl", url);

  document
  .getElementById("loading")
  .style.display = "block";

  document
    .getElementById("frame")
    .src =
      "/api/proxy?url=" +
      encodeURIComponent(url);
}

function back(){

  document
  .getElementById("frame")
  .contentWindow
  .history
  .back();

}

function reloadPage(){

  document
  .getElementById("frame")
  .contentWindow
  .location
  .reload();

}

document
.getElementById("url")
.addEventListener("keypress", function(e){

  if(e.key === "Enter"){
    go();
  }

});

document
.getElementById("frame")
.onload = function(){

  document
  .getElementById("loading")
  .style.display = "none";

}

document
.getElementById("url")
.value =
localStorage.getItem("lastUrl") || "";

</script>
