<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Mini Proxy</title>

<style>

body{
  background:#111;
  color:white;
  font-family:sans-serif;
  margin:0;
}

.top{
  display:flex;
  gap:10px;
  padding:15px;
  background:#1e1e1e;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:white;
}

iframe{
  width:100%;
  height:90vh;
  border:none;
  background:white;
}

</style>

</head>

<body>

<div class="top">

<input
id="url"
placeholder="https://example.com"
/>

<button onclick="go()">
Open
</button>

</div>

<iframe id="frame"></iframe>

<script>

function go(){

  let url =
    document.getElementById("url").value;

  if(!url.startsWith("http")){
    url = "https://" + url;
  }

  document.getElementById("frame").src =
    "/api/proxy?url=" +
    encodeURIComponent(url);
}

</script>

</body>
</html>
