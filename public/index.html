<script>

function go(){

  let url =
    document.getElementById("url").value;

  if(!url.startsWith("http")){
    url = "https://" + url;
  }

  document
    .getElementById("frame")
    .src =
      "/api/proxy?url=" +
      encodeURIComponent(url);
}

document
.getElementById("url")
.addEventListener("keypress", function(e){

  if(e.key === "Enter"){
    go();
  }

});

</script>
